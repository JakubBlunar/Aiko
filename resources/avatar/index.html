<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avatar</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: #f8fafc;
      user-select: none;
      -webkit-user-select: none;
    }
    #stage {
      position: absolute;
      inset: 0;
    }
    #stage canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: transparent;
    }
    #banner {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.78);
      color: #f8fafc;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      pointer-events: auto;
      display: none;
    }
    #banner.visible { display: block; }
    #banner a { color: #93c5fd; }
    #drag {
      position: absolute;
      top: 0; left: 0; right: 0; height: 24px;
      cursor: move;
      display: none;
    }
    body.overlay #drag { display: block; }
  </style>
  <script src="../vendor/live2d/live2dcubismcore.min.js"
          onerror="window.__cubismCoreMissing = true"></script>
  <script src="../vendor/live2d/pixi.min.js"
          onerror="window.__pixiMissing = true"></script>
  <script src="../vendor/live2d/pixi-live2d-display.min.js"
          onerror="window.__pixiLive2dMissing = true"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"
          onerror="window.__qwebchannelMissing = true"></script>
</head>
<body>
  <div id="stage"></div>
  <div id="drag"></div>
  <div id="banner"></div>
  <script src="avatar.js"></script>
</body>
</html>
