[project]
name = "english-speaking-assistant"
version = "0.2.0"
description = "Lean Aiko: anime-waifu AI companion with direct Ollama, RealtimeSTT, and Pocket-TTS"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PySide6>=6.8.0",
  "requests>=2.32.3",
  "sounddevice>=0.5.1",
  "numpy>=2.2.3",
  "soundfile>=0.13.0",
  "uvicorn>=0.30.0",
  "mcp>=1.0.0",
  "realtimestt>=0.3.100",
  "pocket-tts>=1.1.0",
  "pydub>=0.25.0",
  "audioop-lts>=0.2.1; python_version>='3.13'",
]

[project.optional-dependencies]
chat-ui = [
  "markdown>=3.5.0",
]
wake-word = [
  "openwakeword>=0.6.0",
]
dev = [
  "pytest>=8.0.0",
]
all = [
  "english-speaking-assistant[chat-ui,wake-word,dev]",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["app"]

[tool.setuptools.package-dir]
app = "app"

[tool.ruff]
line-length = 100
