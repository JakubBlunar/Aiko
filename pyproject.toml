[project]
name = "english-speaking-assistant"
version = "0.1.0"
description = "Local speech-to-speech + type-in assistant with RealtimeSTT, Kokoro TTS, and Agno (Ollama)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PySide6>=6.8.0",
  "requests>=2.32.3",
  "sounddevice>=0.5.1",
  "numpy>=2.2.3",
  "mss>=10.0.0",
  "agno>=1.2.6",
  "openai>=1.0.0",
  "realtimestt>=0.3.100",
  "soundfile>=0.13.0",
  "onnxruntime>=1.20.1",
  "kokoro-onnx>=0.4.7",
  "misaki",
  "ollama>=0.3.0",
]

[project.optional-dependencies]
agent = [
  "googlesearch-python",
  "wikipedia",
  "arxiv",
]
ocr = [
  "rapidocr-onnxruntime>=1.2.3",
]
actions = [
  "pyautogui>=0.9.54",
]
dev = [
  "pytest>=8.0.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["app"]

[tool.setuptools.package-dir]
app = "app"

[tool.ruff]
line-length = 100
