[project]
name = "english-speaking-assistant"
version = "0.1.0"
description = "Local Python desktop AI assistant for spoken English practice"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PySide6>=6.8.0",
  "requests>=2.32.3",
  "sounddevice>=0.5.1",
  "numpy>=2.2.3",
  "mss>=10.0.0",
]

[project.optional-dependencies]
ai = [
  "faster-whisper>=1.1.1",
  "rapidocr-onnxruntime>=1.2.3",
]

tts = [
  "piper-tts>=1.3.0",
]

actions = [
  "pyautogui>=0.9.54",
]

llasa = [
  "transformers>=4.47.0",
  "soundfile>=0.12.1",
  "sentencepiece>=0.2.0",
  "accelerate>=1.2.1",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["app"]

[tool.setuptools.package-dir]
app = "app"

[tool.ruff]
line-length = 100
