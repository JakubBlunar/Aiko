enabled_tools: []
disabled_tools: []

policies:
  full_auto: false
  read_only_auto: true
  mutating_requires_confirmation: true
  max_tool_calls_per_turn: 64
  default_timeout_ms: 10000

runtime_overrides: {}

tools:
  history:
    default_limit: 50
    max_limit: 400
    prompt_limit: 20
    summary_enabled: true
    summary_limit: 80
    summary_max_chars: 420
    summary_tail_limit: 8
    startup_history_limit: 20
    preload_on_startup: true
  persona:
    profile_path: "data/persona_profile.json"
    compact_notes_enabled: true
    compact_max_notes: 10
    compact_max_chars: 110
