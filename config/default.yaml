assistant:
  name: "English Speaking Assistant"
  mode: "natural_chat"
  remember_history: true
  personality: "friendly"

ollama:
  base_url: "http://127.0.0.1:11434"
  chat_model: "llama3.1:8b"
  temperature: 0.6

audio:
  sample_rate: 16000
  channels: 1
  enable_microphone: true
  enable_system_audio: false
  microphone_device: null
  loopback_device: null
  vad_level_threshold: 0.02
  vad_silence_seconds: 1.0

screen:
  enable_screen_context: false
  capture_interval_seconds: 2
  decision_mode: "model"
  decision_cooldown_seconds: 8

stt:
  provider: "faster_whisper"
  model: "base"

tts:
  provider: "piper"
  voice: "en_US-lessac-medium"
  enabled: true
